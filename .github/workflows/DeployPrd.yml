name: Build and Push to ECR (PRD)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: prd-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubDeployRole
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_REPO="$ECR_REGISTRY/${ECR_REPOSITORY}-prd"
          docker build -f module-bootstrap/Dockerfile -t $FULL_REPO:$IMAGE_TAG .
          docker tag $FULL_REPO:$IMAGE_TAG $FULL_REPO:latest
          docker push $FULL_REPO:$IMAGE_TAG
          docker push $FULL_REPO:latest
